groups:
  - name: ducklog-error-rate
    type: vlogs
    interval: 1m
    rules:
      # 固定門檻(非真「突增」,見 spec caveat):每 service 1m 視窗 error 數超過門檻即報
      - alert: HighErrorRate
        expr: 'level:=error | stats by (service) count() as errs | filter errs:>50'
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'service {{ index .Labels "service" }} 在 1 分鐘視窗內有 {{ $value }} 筆 error,超過門檻 50'
